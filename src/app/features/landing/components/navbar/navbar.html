<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="container">
    <a routerLink="/" class="brand">
      <img src="/logo_atmora.png" alt="Logo Atmora" class="logo-img" />
      <span class="brand-name">Atmora</span>
    </a>

    <button class="mobile-toggle" (click)="toggleMenu()">
      <i class="bx" [class.bx-menu]="!menuOpen" [class.bx-x]="menuOpen"></i>
    </button>

    <div class="nav-content" [class.active]="menuOpen">
      <ul class="nav-links">
        <li>
          <a
            routerLink="/"
            fragment="problema"
            [class.active-link]="activeSection === 'problema'"
            (click)="menuOpen = false"
          >
            El Problema
          </a>
        </li>

        <li>
          <a
            routerLink="/"
            fragment="solucion"
            [class.active-link]="activeSection === 'solucion'"
            (click)="menuOpen = false"
          >
            Solución
          </a>
        </li>

        <li>
          <a
            routerLink="/"
            fragment="beneficios"
            [class.active-link]="activeSection === 'beneficios'"
            (click)="menuOpen = false"
          >
            Beneficios
          </a>
        </li>

        <li>
          <a
            routerLink="/"
            fragment="precios"
            [class.active-link]="activeSection === 'precios'"
            (click)="menuOpen = false"
          >
            Precios
          </a>
        </li>

        <li>
          <a
            routerLink="/"
            fragment="equipo"
            [class.active-link]="activeSection === 'equipo'"
            (click)="menuOpen = false"
          >
            Equipo
          </a>
        </li>
      </ul>

      <ng-container *ngIf="currentUser$ | async as user; else loggedOut">
        <div class="profile-menu-container">
          <button class="profile-btn" (click)="toggleProfileMenu()">
            <img [src]="user.avatar" alt="Perfil" class="avatar-img">
          </button>

          <div class="dropdown-menu" [class.show]="isProfileMenuOpen">
            <div class="dropdown-header">
              <span class="user-name">{{ user.nombre }}</span>
              <span class="user-email">{{ user.correo }}</span>
            </div>
            <ul class="dropdown-links">
              <li>
                <a routerLink="/perfil" (click)="menuOpen = false; isProfileMenuOpen = false">
                  <i class='bx bx-user-circle'></i> Editar Perfil
                </a>
              </li>
              <li>
                <button (click)="logout()" class="btn-logout-nav">
                  <i class='bx bx-log-out'></i> Cerrar Sesión
                </button>
              </li>
            </ul>
          </div>
        </div>
      </ng-container>

      <ng-template #loggedOut>
        <div class="auth-buttons">
          <a routerLink="/auth" class="btn-login" (click)="menuOpen = false">Iniciar Sesión</a>
          <a routerLink="/auth" [queryParams]="{ mode: 'register' }" class="btn-register" (click)="menuOpen = false">
            Registrarse
          </a>
        </div>
      </ng-template>

    </div>
  </div>
</nav>
